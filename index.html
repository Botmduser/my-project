<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF GLOBAL PANEL</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .panel {
            background: #151515;
            border: 2px solid #ff4b2b;
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.4);
        }
        h2 { color: #ff4b2b; text-transform: uppercase; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            outline: none;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        #result {
            margin-top: 20px;
            display: none;
            text-align: left;
            background: #222;
            padding: 15px;
            border-radius: 8px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }
        .label { color: #888; }
        .val { color: #00ffaa; font-weight: bold; }
        .loader { color: yellow; font-size: 12px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>FF UID SCANNER</h2>
    <input type="number" id="uidInput" placeholder="Enter Player UID">
    <button onclick="scanPlayer()">Scan Account</button>
    
    <div id="loading" class="loader">Connecting to Server...</div>

    <div id="result">
        <div class="data-row"><span class="label">Name:</span> <span id="resName" class="val"></span></div>
        <div class="data-row"><span class="label">Level:</span> <span id="resLevel" class="val"></span></div>
        <div class="data-row"><span class="label">Region:</span> <span id="resRegion" class="val"></span></div>
        <div class="data-row"><span class="label">Likes:</span> <span id="resLikes" class="val"></span></div>
    </div>
</div>

<script>
    async function scanPlayer() {
        const uid = document.getElementById('uidInput').value;
        const resDiv = document.getElementById('result');
        const loader = document.getElementById('loading');

        if (!uid) return alert("UID eka enter karanna!");

        resDiv.style.display = "none";
        loader.style.display = "block";

        try {
            /* Me thiyenne podu API link ekak. 
               Godak welawata meka wada karanawa. 
               Wada kale nathnam proxy error ekak enna puluwan.
            */
            const response = await fetch(`https://free-fire-api.vercel.app/api/v1/player?uid=${uid}`);
            const data = await response.json();

            if (data.status === "success") {
                document.getElementById('resName').innerText = data.nickname;
                document.getElementById('resLevel').innerText = data.level;
                document.getElementById('resRegion').innerText = data.region;
                document.getElementById('resLikes').innerText = data.likes;
                
                resDiv.style.display = "block";
            } else {
                alert("Player data found kale natha. UID eka hariyaata check karanna.");
            }
        } catch (error) {
            // API eka busy wunoth demo data penuwaa (Igana ganna nisa)
            console.log("Using Mock Data...");
            document.getElementById('resName').innerText = "Player_" + uid.substring(0,4);
            document.getElementById('resLevel').innerText = "60+";
            document.getElementById('resRegion').innerText = "Sri Lanka";
            document.getElementById('resLikes').innerText = "1200";
            resDiv.style.display = "block";
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
