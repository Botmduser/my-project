<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto HTML Downloader</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
        }
        h2 { color: #1c1e21; margin-bottom: 10px; }
        p { color: #606770; font-size: 14px; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #dddfe2; 
            border-radius: 6px; 
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus { border-color: #1877f2; }
        button { 
            background-color: #1877f2; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover { background-color: #166fe5; }
        #status { 
            margin-top: 15px; 
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>HTML Code Getter</h2>
    <p>Oyaata oni web link eka pahala enter karanna.</p>
    
    <input type="url" id="urlInput" value="https://exam-results-grade11-kns.vercel.app/" placeholder="https://example.com">
    
    <button onclick="downloadHTML()">Download Source Code</button>
    
    <div id="status"></div>
</div>

<script>
    async function downloadHTML() {
        const url = document.getElementById('urlInput').value;
        const statusDiv = document.getElementById('status');

        if (!url) {
            alert("Karunakara link ekak enter karanna!");
            return;
        }

        // Status update
        statusDiv.style.display = "block";
        statusDiv.style.backgroundColor = "#e7f3ff";
        statusDiv.style.color = "#1877f2";
        statusDiv.innerText = "Processing... Poddak inna...";

        try {
            // Me proxy eka auto-active wenawa
            const finalUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
            
            const response = await fetch(finalUrl);
            
            if (!response.ok) throw new Error('Proxy error ekak awa. Site eka block karala wenna puluwan.');
            
            const htmlData = await response.text();

            // Blob ekak hadala download link ekak create kirima
            const blob = new Blob([htmlData], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "downloaded_source.html";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            statusDiv.style.backgroundColor = "#eafbe7";
            statusDiv.style.color = "#28a745";
            statusDiv.innerText = "Sarthakai! HTML file eka download una.";

        } catch (error) {
            statusDiv.style.backgroundColor = "#ffebe9";
            statusDiv.style.color = "#d93025";
            statusDiv.innerText = "Error: " + error.message;
        }
    }
</script>

</body>
</html>
