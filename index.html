<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Link Tree</title>
    <style>
        /* CSS - Meken thamai design eka hadenne */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 { font-size: 22px; margin-bottom: 10px; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 30px; }

        /* Links Buttons */
        .link {
            display: block;
            background: white;
            color: #333;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Mouse eka link eka udata giyama wena de (Hover) */
        .link:hover {
            transform: scale(1.05);
            background: #f0f0f0;
            color: #764ba2;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/100" alt="Profile Picture" class="profile-img">

    <h1>Oyaage Nama</h1>
    <p>Web Developer | Student | Tech Enthusiast</p>

    <a href="https://facebook.com" class="link" target="_blank">Facebook</a>
    <a href="https://whatsapp.com" class="link" target="_blank">WhatsApp Chat</a>
    <a href="https://github.com" class="link" target="_blank">GitHub Portfolio</a>
    <a href="https://youtube.com" class="link" target="_blank">YouTube Channel</a>

    <div class="footer">
        Created by Me © 2026
    </div>
</div>

</body>
</html>
