<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Source Downloader</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #1e293b; margin-bottom: 8px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #94a3b8;
        }
        #status {
            margin-top: 15px;
            font-weight: bold;
            font-size: 13px;
        }
        .proxy-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Downloader</h2>
    <p>Website link eka paste karanna</p>
    
    <input type="url" id="urlInput" placeholder="https://..." value="https://exam-results-grade11-kns.vercel.app/">
    
    <button onclick="fetchAndDownload()">Download HTML</button>
    
    <div id="status"></div>

    <div class="footer">
        "Failed to fetch" awoth, pahala link ekata gihin <b>Request Access</b> click karala aye try karanna:<br>
        <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" class="proxy-link">Proxy eka Active karanna</a>
    </div>
</div>

<script>
    async function fetchAndDownload() {
        const url = document.getElementById('urlInput').value;
        const status = document.getElementById('status');
        
        if (!url) {
            alert("URL ekak danna!");
            return;
        }

        status.style.color = "blue";
        status.innerText = "Downloading... Poddak inna...";

        try {
            // Vercel sites block karana nisa Proxy eka use karanawa
            const proxy = 'https://cors-anywhere.herokuapp.com/';
            const response = await fetch(proxy + url);
            
            if (!response.ok) throw new Error('Proxy error');
            
            const htmlContent = await response.text();

            // File eka download karana widiha
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const downloadLink = document.createElement('a');
            downloadLink.href = URL.createObjectURL(blob);
            downloadLink.download = "downloaded-page.html";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);

            status.style.color = "green";
            status.innerText = "Sarthakai! File eka download una.";
        } catch (error) {
            status.style.color = "red";
            status.innerText = "Error: Proxy eka active karala naha.";
            console.error(error);
        }
    }
</script>

</body>
</html>
